name: Auto Backup
on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror to backup repo
        env:
          BACKUP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --mirror "https://x-access-token:${BACKUP_TOKEN}@github.com/tianqihuang63-png/colmo-data-tooll.git" repo
          cd repo
          git push --mirror "https://x-access-token:${BACKUP_TOKEN}@github.com/tianqihuang63-png/colmo-data-tooll-backup.git"
